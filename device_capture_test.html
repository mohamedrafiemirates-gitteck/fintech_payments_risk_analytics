<!DOCTYPE html>
<html>
<head>
  <title>Device Capture Test</title>
</head>
<body>
  <h2>Device Capture Test</h2>

  <label for="customerId">Customer ID</label>
  <input id="customerId" type="text" value="CUST01001">

  <br><br>

  <button onclick="captureDeviceSession()">Capture Device Session</button>

  <pre id="output"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://qsfrfuybavxdgjvbilcl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzZnJmdXliYXZ4ZGdqdmJpbGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTU2NDAsImV4cCI6MjA5NzY3MTY0MH0.Gl9Tb_3Ar2UDuAF9ogzXlWV2XO64WWrMtsXBj-qOPXg";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function detectDeviceType() {
      const userAgent = navigator.userAgent.toLowerCase();

      if (/ipad|tablet/.test(userAgent)) return "Tablet";
      if (/mobile|iphone|android/.test(userAgent)) return "Mobile";

      return "Desktop";
    }

    function detectOS() {
      const userAgent = navigator.userAgent;

      if (userAgent.includes("Windows")) return "Windows";
      if (userAgent.includes("Mac OS")) return "macOS";
      if (userAgent.includes("Android")) return "Android";
      if (userAgent.includes("iPhone") || userAgent.includes("iPad")) return "iOS";
      if (userAgent.includes("Linux")) return "Linux";

      return "Unknown";
    }

    function detectBrowser() {
      const userAgent = navigator.userAgent;

      if (userAgent.includes("Edg")) return "Microsoft Edge";
      if (userAgent.includes("Chrome")) return "Google Chrome";
      if (userAgent.includes("Safari")) return "Safari";
      if (userAgent.includes("Firefox")) return "Firefox";

      return "Unknown";
    }

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve({
            latitude: null,
            longitude: null,
            gps_accuracy_meters: null,
            location_address: "Geolocation not supported"
          });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            resolve({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              gps_accuracy_meters: position.coords.accuracy,
              location_address: "GPS captured from browser permission"
            });
          },
          () => {
            resolve({
              latitude: null,
              longitude: null,
              gps_accuracy_meters: null,
              location_address: "Location permission denied or unavailable"
            });
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      });
    }

    async function getIpDetails() {
  try {
    const response = await fetch("https://ipapi.co/json/");
    const data = await response.json();

    console.log("Raw IP API Response:", data);

    return {
      ip_address: data.ip || null,
      ip_country: data.country_name || null,
      ip_city: data.city || null,
      ip_error: null
    };
  } catch (error) {
    console.log("IP API Error:", error);

    return {
      ip_address: null,
      ip_country: null,
      ip_city: null,
      ip_error: String(error)
    };
  }
}
   




    async function getAddressFromCoordinates(latitude, longitude) {
      if (!latitude || !longitude) {
        return {
          location_address: null,
          location_emirate: null,
          location_country: null,
          location_city: null
        };
      }

      try {
        const url =
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`;

        const response = await fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        });

        const data = await response.json();
        const address = data.address || {};

        return {
          location_address: data.display_name || null,
          location_emirate:
            address.state ||
            address.region ||
            address.county ||
            null,
          location_country: address.country || null,
          location_city:
            address.city ||
            address.town ||
            address.village ||
            address.suburb ||
            null
        };
      } catch (error) {
        return {
          location_address: null,
          location_emirate: null,
          location_country: null,
          location_city: null
        };
      }
    }

    async function captureDeviceSession() {
      const output = document.getElementById("output");
      output.textContent = "Capturing device session...";

      const customerId = document.getElementById("customerId").value.trim();

      if (!customerId) {
        output.textContent = "Please enter customer ID.";
        return;
      }

      const locationData = await getLocation();

      const addressDetails = await getAddressFromCoordinates(
        locationData.latitude,
        locationData.longitude
      );

      const ipDetails = await getIpDetails();

      const sessionId = "DEV" + Date.now();

      console.log("IP Details:", ipDetails);

      const record = {
        device_session_id: sessionId,
        customer_id: customerId,
        device_id: "WEB-" + navigator.userAgent.slice(0, 25).replace(/[^a-zA-Z0-9]/g, ""),
        device_type: detectDeviceType(),
        os_name: detectOS(),
        browser_name: detectBrowser(),
        app_version: "browser-test-v2",
        ip_address: ipDetails.ip_address,
        ip_country: ipDetails.ip_country,
        ip_city: ipDetails.ip_city,
        location_emirate: addressDetails.location_emirate,
        latitude: locationData.latitude,
        longitude: locationData.longitude,
        location_address: addressDetails.location_address || locationData.location_address,
        gps_accuracy_meters: locationData.gps_accuracy_meters,
        network_type: navigator.onLine ? "Online" : "Offline",
        is_vpn: false,
        is_proxy: false,
        login_timestamp: new Date().toISOString(),
        session_status: "Active"
      };

      const { data, error } = await supabaseClient
        .from("customer_device_sessions")
        .insert(record)
        .select();

      if (error) {
        output.textContent = "Insert failed:\n" + JSON.stringify(error, null, 2);
        return;
      }

      output.textContent = "Insert successful:\n" + JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
