<!DOCTYPE html>
<html>
<head>
  <title>Device Capture Test</title>
</head>
<body>
  <h2>Device Capture Test</h2>

  <label for="customerId">Customer ID</label>
  <input id="customerId" type="text" value="CUST01001">

  <br><br>

  <button onclick="captureDeviceSession()">Capture Device Session</button>

  <pre id="output"></pre>

  <script>
    function detectDeviceType() {
      const userAgent = navigator.userAgent.toLowerCase();

      if (/ipad|tablet/.test(userAgent)) return "Tablet";
      if (/mobile|iphone|android/.test(userAgent)) return "Mobile";

      return "Desktop";
    }

    function detectOS() {
      const userAgent = navigator.userAgent;

      if (userAgent.includes("Windows")) return "Windows";
      if (userAgent.includes("Mac OS")) return "macOS";
      if (userAgent.includes("Android")) return "Android";
      if (userAgent.includes("iPhone") || userAgent.includes("iPad")) return "iOS";
      if (userAgent.includes("Linux")) return "Linux";

      return "Unknown";
    }

    function detectBrowser() {
      const userAgent = navigator.userAgent;

      if (userAgent.includes("Edg")) return "Microsoft Edge";
      if (userAgent.includes("Chrome")) return "Google Chrome";
      if (userAgent.includes("Safari")) return "Safari";
      if (userAgent.includes("Firefox")) return "Firefox";

      return "Unknown";
    }

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve({
            latitude: null,
            longitude: null,
            gps_accuracy_meters: null,
            location_address: "Geolocation not supported"
          });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            resolve({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              gps_accuracy_meters: position.coords.accuracy,
              location_address: "GPS captured from browser permission"
            });
          },
          () => {
            resolve({
              latitude: null,
              longitude: null,
              gps_accuracy_meters: null,
              location_address: "Location permission denied or unavailable"
            });
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      });
    }

    async function getAddressFromCoordinates(latitude, longitude) {
      if (!latitude || !longitude) {
        return {
          location_address: null,
          location_emirate: null,
          location_country: null,
          location_city: null
        };
      }

      try {
        const url =
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`;

        const response = await fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        });

        const data = await response.json();
        const address = data.address || {};

        return {
          location_address: data.display_name || null,
          location_emirate:
            address.state ||
            address.region ||
            address.county ||
            null,
          location_country: address.country || null,
          location_city:
            address.city ||
            address.town ||
            address.village ||
            address.suburb ||
            null
        };
      } catch (error) {
        return {
          location_address: null,
          location_emirate: null,
          location_country: null,
          location_city: null
        };
      }
    }

    async function captureDeviceSession() {
      const output = document.getElementById("output");
      output.textContent = "Capturing device session...";

      const customerId = document.getElementById("customerId").value.trim();

      if (!customerId) {
        output.textContent = "Please enter customer ID.";
        return;
      }

      const locationData = await getLocation();

      const addressDetails = await getAddressFromCoordinates(
        locationData.latitude,
        locationData.longitude
      );

      const record = {
        customer_id: customerId,
        device_id: "WEB-" + navigator.userAgent.slice(0, 25).replace(/[^a-zA-Z0-9]/g, ""),
        device_type: detectDeviceType(),
        os_name: detectOS(),
        browser_name: detectBrowser(),
        app_version: "browser-backend-test-v1",
        location_emirate: addressDetails.location_emirate,
        latitude: locationData.latitude,
        longitude: locationData.longitude,
        location_address: addressDetails.location_address || locationData.location_address,
        gps_accuracy_meters: locationData.gps_accuracy_meters,
        network_type: navigator.onLine ? "Online" : "Offline"
      };

      const response = await fetch("https://fintech-payments-risk-analytics.onrender.com/capture-device-session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(record)
      });

      const result = await response.json();

      if (!response.ok) {
        output.textContent = "Insert failed:\n" + JSON.stringify(result, null, 2);
        return;
      }

      output.textContent = "Insert successful:\n" + JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
